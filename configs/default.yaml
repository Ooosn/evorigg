      post_rebalance_local_steps: 0
    branch:
      rebalance_delay_progress: 0.0909
      inserted_pose_ramp_progress: 0.1364
      inserted_pose_grad_scale: 0.25
      rebalance_branch_vertex_k: 32
      rebalance_parent_vertex_k: 40
      rebalance_child_vertex_k: 28
      rebalance_min_vertex_weight: 0.035
      rebalance_pose_blend: 0.9
      rebalance_parent_pose_scale: 1.0
      rebalance_child_pose_scale: 0.75
      rebalance_new_pose_scale: 0.9
    split:
